<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Default Theme: Midnight Blue */
            --primary: #3b82f6; 
            --bg-site: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --progress-width: 100%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.6s ease, color 0.6s ease;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, rgba(var(--primary-rgb), 0.15) 0%, transparent 50%);
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        [dir="rtl"] .top-bar { right: auto; left: 30px; }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }
        .icon-btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-color: transparent;}

        /* App Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            align-items: start;
        }

        /* Cards Shared */
        .glass-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
        }

        /* ----- TIMER SECTION ----- */
        .timer-card { text-align: center; display: flex; flex-direction: column; gap: 20px; }
        
        .mode-tabs {
            display: flex; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 5px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim);
            font-weight: 600; border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 1.1rem;
        }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .time-display-wrapper { position: relative; margin: 20px 0; }
        .timer-display {
            font-size: 6.5rem; font-weight: 800; font-variant-numeric: tabular-nums;
            letter-spacing: -2px; line-height: 1; text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        /* Time Setup Inputs */
        .time-setup {
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .time-input-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .time-input-group label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .time-input {
            width: 60px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: 700;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 12px; outline: none; transition: 0.3s; font-family: inherit;
        }
        .time-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .time-colon { font-size: 2rem; font-weight: bold; color: var(--text-dim); margin-top: 15px; }
        .apply-time-btn {
            background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 20px; margin-top: 15px;
            border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%;
        }
        .apply-time-btn:hover { background: var(--primary); }

        /* Progress Bar */
        .progress-track { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: var(--progress-width); background: var(--primary); border-radius: 10px; transition: width 1s linear; }

        /* Controls */
        .main-controls { display: flex; gap: 15px; margin-top: 10px; }
        .btn-large {
            padding: 18px; border-radius: 15px; font-size: 1.2rem; font-weight: 700;
            border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit;
        }
        .btn-start { background: var(--text-main); color: var(--bg-site); flex: 3; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
        .btn-reset { background: rgba(255,255,255,0.05); color: var(--text-main); flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .btn-reset:hover { background: rgba(255,255,255,0.1); }

        /* ----- SETTINGS & TASKS SECTION ----- */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        
        /* Themes Setup */
        .settings-card { padding: 25px; }
        .section-title { font-size: 1rem; font-weight: 700; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .theme-presets { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .theme-circle {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1);
            transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .theme-circle:hover { transform: scale(1.1); }
        .theme-circle.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        .custom-colors { display: flex; gap: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .color-picker { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .color-picker span { font-size: 0.7rem; color: var(--text-dim); }
        .color-input { width: 30px; height: 30px; border: none; border-radius: 5px; cursor: pointer; background: transparent; }

        /* Tasks Setup */
        .tasks-card { flex-grow: 1; display: flex; flex-direction: column; }
        .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .task-stats { font-size: 0.85rem; color: var(--primary); font-weight: 600; background: rgba(var(--primary-rgb), 0.1); padding: 5px 12px; border-radius: 20px; }
        
        .task-input-wrapper { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-input {
            flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 15px; border-radius: 15px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .task-input:focus { border-color: var(--primary); }
        .add-btn {
            background: var(--primary); color: #fff; border: none; width: 55px; border-radius: 15px;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .add-btn:hover { background: #fff; color: var(--primary); }

        .tasks-list { list-style: none; overflow-y: auto; max-height: 250px; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .tasks-list::-webkit-scrollbar { width: 5px; }
        .tasks-list::-webkit-scrollbar-track { background: transparent; }
        .tasks-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .task-item {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.3s; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
        .task-content { display: flex; align-items: center; gap: 15px; cursor: pointer; flex: 1; }
        
        .checkbox {
            width: 22px; height: 22px; border: 2px solid var(--text-dim); border-radius: 6px;
            display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }
        .task-item.done .checkbox { background: var(--primary); border-color: var(--primary); }
        .task-item.done .checkbox::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }
        .task-text { font-size: 1rem; transition: 0.3s; word-break: break-word; }
        
        .delete-btn { background: transparent; color: #ef4444; border: none; font-size: 1.1rem; cursor: pointer; opacity: 0.5; transition: 0.3s; padding: 5px; }
        .delete-btn:hover { opacity: 1; transform: scale(1.1); }

        .tasks-footer { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .text-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; transition: 0.3s; font-family: inherit;}
        .text-btn:hover { color: #fff; text-decoration: underline; }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .timer-display { font-size: 5rem; }
        }
        @media (max-width: 500px) {
            .time-input { width: 50px; height: 45px; font-size: 1.2rem; }
            .timer-display { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="top-bar">
        <button class="icon-btn" onclick="toggleLanguage()" title="Language (EN/AR)"><i class="fa-solid fa-language"></i></button>
        <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen"><i class="fa-solid fa-expand" id="fsIcon"></i></button>
    </div>

    <div class="dashboard">
        
        <div class="glass-card timer-card">
            <div class="mode-tabs">
                <button class="tab-btn active" id="tab-focus" onclick="switchMode('focus')" data-i18n="mode_focus">Focus Time</button>
                <button class="tab-btn" id="tab-break" onclick="switchMode('break')" data-i18n="mode_break">Break Time</button>
            </div>

            <div class="time-setup" id="timeSetupUI">
                <div class="time-input-group">
                    <input type="number" id="inp-h" class="time-input" min="0" max="99" value="0">
                    <label data-i18n="lbl_h">Hours</label>
                </div>
                <div class="time-colon">:</div>
                <div class="time-input-group">
                    <input type="number" id="inp-m" class="time-input" min="0" max="59" value="25">
                    <label data-i18n="lbl_m">Mins</label>
                </div>
                <div class="time-colon">:</div>
                <div class="time-input-group">
                    <input type="number" id="inp-s" class="time-input" min="0" max="59" value="0">
                    <label data-i18n="lbl_s">Secs</label>
                </div>
                <button class="apply-time-btn" onclick="applyCustomTime()" data-i18n="btn_set">Set</button>
            </div>

            <div class="time-display-wrapper">
                <div class="timer-display" id="display-time">25:00:00</div>
            </div>

            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>

            <div class="main-controls">
                <button class="btn-large btn-start" onclick="toggleTimer()" id="main-action">
                    <i class="fa-solid fa-play"></i> <span data-i18n="btn_start">Start Focus</span>
                </button>
                <button class="btn-large btn-reset" onclick="resetTimer()" title="Reset">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>

        <div class="side-panel">
            
            <div class="glass-card settings-card">
                <div class="section-title" data-i18n="title_themes">Appearance & Themes</div>
                
                <div class="theme-presets" id="theme-buttons">
                    </div>

                <div class="custom-colors">
                    <div class="color-picker">
                        <input type="color" id="color-accent" class="color-input" onchange="setCustomColors()">
                        <span data-i18n="lbl_accent">Accent</span>
                    </div>
                    <div class="color-picker">
                        <input type="color" id="color-bg" class="color-input" onchange="setCustomColors()">
                        <span data-i18n="lbl_bg">Background</span>
                    </div>
                </div>
            </div>

            <div class="glass-card tasks-card">
                <div class="tasks-header">
                    <div class="section-title" style="margin:0;" data-i18n="title_tasks">Session Tasks</div>
                    <div class="task-stats" id="task-stats">0/0</div>
                </div>

                <div class="task-input-wrapper">
                    <input type="text" id="task-input" class="task-input" placeholder="What to achieve?" data-i18n-ph="ph_task" onkeypress="handleTaskEnter(event)">
                    <button class="add-btn" onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
                </div>

                <ul class="tasks-list" id="task-list">
                    </ul>

                <div class="tasks-footer">
                    <button class="text-btn" onclick="clearCompletedTasks()" data-i18n="btn_clear_done">Clear Completed</button>
                    <button class="text-btn" onclick="clearAllTasks()" style="color: #ef4444;" data-i18n="btn_clear_all">Clear All</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- Translations ---
        let currentLang = 'en';
        const i18n = {
            en: {
                mode_focus: "Focus Time", mode_break: "Break Time",
                lbl_h: "Hours", lbl_m: "Mins", lbl_s: "Secs", btn_set: "Set Time",
                btn_start: "Start", btn_pause: "Pause",
                title_themes: "Appearance & Themes", lbl_accent: "Accent", lbl_bg: "Backdrop",
                title_tasks: "Session Tasks", ph_task: "What to achieve?",
                btn_clear_done: "Clear Completed", btn_clear_all: "Clear All"
            },
            ar: {
                mode_focus: "وقت التركيز", mode_break: "وقت الاستراحة",
                lbl_h: "ساعات", lbl_m: "دقائق", lbl_s: "ثواني", btn_set: "تأكيد",
                btn_start: "ابدأ", btn_pause: "إيقاف مؤقت",
                title_themes: "المظهر والألوان", lbl_accent: "اللون الأساسي", lbl_bg: "الخلفية",
                title_tasks: "مهام الجلسة", ph_task: "هتنجز إيه دلوقتي؟",
                btn_clear_done: "مسح المكتمل", btn_clear_all: "مسح الكل"
            }
        };

        // --- Timer State ---
        let modes = {
            focus: { h: 0, m: 25, s: 0, totalSeconds: 1500 },
            break: { h: 0, m: 5, s: 0, totalSeconds: 300 }
        };
        let currentMode = 'focus'; // 'focus' or 'break'
        let timeLeft = modes[currentMode].totalSeconds;
        let timerId = null;
        let isRunning = false;

        // --- Themes ---
        const themes = [
            { id: 't1', name: 'Midnight', primary: '#3b82f6', bg: '#0f172a', card: 'rgba(30, 41, 59, 0.7)' },
            { id: 't2', name: 'Sunset', primary: '#f43f5e', bg: '#2e1022', card: 'rgba(76, 29, 49, 0.6)' },
            { id: 't3', name: 'Forest', primary: '#10b981', bg: '#064e3b', card: 'rgba(6, 95, 70, 0.6)' },
            { id: 't4', name: 'Amethyst', primary: '#a855f7', bg: '#2e1065', card: 'rgba(76, 29, 149, 0.6)' },
            { id: 't5', name: 'Carbon', primary: '#ffffff', bg: '#111111', card: 'rgba(38, 38, 38, 0.7)' },
            { id: 't6', name: 'Coffee', primary: '#d97706', bg: '#451a03', card: 'rgba(69, 26, 3, 0.7)' },
            { id: 't7', name: 'Ocean', primary: '#06b6d4', bg: '#083344', card: 'rgba(8, 51, 68, 0.7)' },
            { id: 't8', name: 'Cherry', primary: '#fb7185', bg: '#4c0519', card: 'rgba(76, 5, 25, 0.7)' },
            { id: 't9', name: 'Cyberpunk', primary: '#eab308', bg: '#000000', card: 'rgba(20, 20, 20, 0.7)' },
            { id: 't10', name: 'Nebula', primary: '#d946ef', bg: '#1e1b4b', card: 'rgba(49, 46, 129, 0.5)' },
            { id: 't11', name: 'Glacier', primary: '#7dd3fc', bg: '#0c4a6e', card: 'rgba(12, 74, 110, 0.6)' },
            { id: 't12', name: 'Sahara', primary: '#fbbf24', bg: '#451a03', card: 'rgba(120, 53, 15, 0.5)' },
            { id: 't13', name: 'Deep Sea', primary: '#2dd4bf', bg: '#020617', card: 'rgba(15, 23, 42, 0.8)' },
            { id: 't14', name: 'Lavender', primary: '#c084fc', bg: '#2e1065', card: 'rgba(88, 28, 135, 0.5)' },
            { id: 't15', name: 'Rust', primary: '#f97316', bg: '#431407', card: 'rgba(124, 45, 18, 0.6)' },
            { id: 't16', name: 'Emerald', primary: '#34d399', bg: '#064e3b', card: 'rgba(2, 44, 34, 0.7)' },
            { id: 't17', name: 'Slate', primary: '#94a3b8', bg: '#0f172a', card: 'rgba(30, 41, 59, 0.8)' },
            { id: 't18', name: 'Crimson', primary: '#ef4444', bg: '#450a0a', card: 'rgba(127, 29, 29, 0.6)' },
            { id: 't19', name: 'Gold Rush', primary: '#fbbf24', bg: '#1c1917', card: 'rgba(41, 37, 36, 0.8)' },
            { id: 't20', name: 'Minty', primary: '#5eead4', bg: '#042f2e', card: 'rgba(19, 78, 74, 0.7)' },
            { id: 't21', name: 'Magma', primary: '#ff4d00', bg: '#1a0505', card: 'rgba(45, 10, 10, 0.7)' },
            { id: 't22', name: 'Neon Leaf', primary: '#a3e635', bg: '#022c22', card: 'rgba(6, 78, 59, 0.6)'}
        ];

        // --- Tasks State ---
        let tasks = JSON.parse(localStorage.getItem('eliteTasks')) || [];

        // --- Initialization ---
        window.onload = () => {
            renderThemes();
            applyTheme('t1');
            updateInputsFromMode();
            updateDisplay();
            renderTasks();
        };

        // --- Core Timer Logic ---
        function switchMode(mode) {
            if(isRunning) toggleTimer(); // Pause if running
            currentMode = mode;
            timeLeft = modes[mode].totalSeconds;
            
            // Update UI
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            
            updateInputsFromMode();
            updateDisplay();
            updateActionBtnUI();
        }

        function applyCustomTime() {
            if(isRunning) return; // Don't change while running
            
            let h = parseInt(document.getElementById('inp-h').value) || 0;
            let m = parseInt(document.getElementById('inp-m').value) || 0;
            let s = parseInt(document.getElementById('inp-s').value) || 0;
            
            // Basic validation
            if(m > 59) { h += Math.floor(m/60); m = m%60; }
            if(s > 59) { m += Math.floor(s/60); s = s%60; }
            
            modes[currentMode] = { h, m, s, totalSeconds: (h*3600) + (m*60) + s };
            timeLeft = modes[currentMode].totalSeconds;
            
            // Fix inputs to show validated numbers
            updateInputsFromMode();
            updateDisplay();
            
            // Quick visual feedback
            const btn = document.querySelector('.apply-time-btn');
            const originalText = btn.innerText;
            btn.innerText = "✓";
            setTimeout(() => btn.innerText = originalText, 1000);
        }

        function updateInputsFromMode() {
            document.getElementById('inp-h').value = modes[currentMode].h;
            document.getElementById('inp-m').value = modes[currentMode].m;
            document.getElementById('inp-s').value = modes[currentMode].s;
        }

        function formatTimeDisplay(totalSecs) {
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            
            if(h > 0) return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateDisplay() {
            const displayStr = formatTimeDisplay(timeLeft);
            document.getElementById('display-time').innerText = displayStr;
            document.title = `${displayStr} - ${currentMode === 'focus' ? 'Focus' : 'Break'}`;

            const total = modes[currentMode].totalSeconds;
            const progress = total > 0 ? ((total - timeLeft) / total) * 100 : 0;
            document.documentElement.style.setProperty('--progress-width', `${progress}%`);
        }

        function toggleTimer() {
            if (modes[currentMode].totalSeconds === 0) return alert(currentLang === 'ar' ? "يرجى تحديد الوقت أولاً!" : "Please set the time first!");

            if (isRunning) {
                clearInterval(timerId);
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        document.getElementById('alarmSound').play();
                        isRunning = false;
                        updateActionBtnUI();
                        alert(currentLang === 'ar' ? "الوقت انتهى!" : "Time is up!");
                    }
                }, 1000);
            }
            isRunning = !isRunning;
            updateActionBtnUI();
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = modes[currentMode].totalSeconds;
            updateDisplay();
            updateActionBtnUI();
        }

        function updateActionBtnUI() {
            const btn = document.getElementById('main-action');
            const actionText = isRunning ? i18n[currentLang].btn_pause : i18n[currentLang].btn_start;
            const icon = isRunning ? 'fa-pause' : 'fa-play';
            const modeText = currentLang === 'ar' ? (currentMode==='focus'?'التركيز':'البريك') : (currentMode==='focus'?'Focus':'Break');
            
            btn.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${actionText} ${modeText}</span>`;
        }


        // --- Tasks Logic ---
        function saveTasks() {
            localStorage.setItem('eliteTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function handleTaskEnter(e) { if(e.key === 'Enter') addTask(); }

        function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if(!text) return;

            tasks.unshift({ id: Date.now(), text, completed: false });
            input.value = '';
            saveTasks();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.completed = !task.completed;
                saveTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
        }

        function clearCompletedTasks() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
        }

        function clearAllTasks() {
            if(confirm(currentLang === 'ar' ? "هل أنت متأكد من مسح كل المهام؟" : "Are you sure you want to clear all tasks?")) {
                tasks = [];
                saveTasks();
            }
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            let completedCount = 0;
            
            if(tasks.length === 0) {
                list.innerHTML = `<li style="text-align:center; color: var(--text-dim); margin-top: 20px; font-size: 0.9rem;">${currentLang==='ar'?'لا توجد مهام حالياً.':'No tasks yet.'}</li>`;
            } else {
                tasks.forEach(task => {
                    if(task.completed) completedCount++;
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'done' : ''}`;
                    li.innerHTML = `
                        <div class="task-content" onclick="toggleTask(${task.id})">
                            <div class="checkbox"></div>
                            <span class="task-text">${task.text}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${task.id})"><i class="fa-solid fa-trash"></i></button>
                    `;
                    list.appendChild(li);
                });
            }

            document.getElementById('task-stats').innerText = `${completedCount}/${tasks.length}`;
        }


        // --- Themes Logic ---
        function renderThemes() {
            const container = document.getElementById('theme-buttons');
            themes.forEach(t => {
                const btn = document.createElement('div');
                btn.className = 'theme-circle';
                btn.style.background = `linear-gradient(135deg, ${t.primary} 50%, ${t.bg} 50%)`;
                btn.title = t.name;
                btn.onclick = () => applyTheme(t.id);
                container.appendChild(btn);
            });
        }

        function applyTheme(id) {
            const theme = themes.find(t => t.id === id);
            if(!theme) return;

            document.documentElement.style.setProperty('--primary', theme.primary);
            document.documentElement.style.setProperty('--bg-site', theme.bg);
            document.documentElement.style.setProperty('--card-bg', theme.card);
            
            // Set rgb version for radial gradient background
            const hexToRgb = hex => hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i, (m, r, g, b) => '#' + r + r + g + g + b + b).substring(1).match(/.{2}/g).map(x => parseInt(x, 16)).join(',');
            document.documentElement.style.setProperty('--primary-rgb', hexToRgb(theme.primary));

            // Update inputs
            document.getElementById('color-accent').value = theme.primary;
            document.getElementById('color-bg').value = theme.bg;

            // Update UI state
            document.querySelectorAll('.theme-circle').forEach((el, index) => {
                el.classList.toggle('active', themes[index].id === id);
            });
        }

        function setCustomColors() {
            const accent = document.getElementById('color-accent').value;
            const bg = document.getElementById('color-bg').value;
            
            document.documentElement.style.setProperty('--primary', accent);
            document.documentElement.style.setProperty('--bg-site', bg);
            
            const hexToRgb = hex => hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i, (m, r, g, b) => '#' + r + r + g + g + b + b).substring(1).match(/.{2}/g).map(x => parseInt(x, 16)).join(',');
            document.documentElement.style.setProperty('--primary-rgb', hexToRgb(accent));
            
            document.querySelectorAll('.theme-circle').forEach(el => el.classList.remove('active'));
        }


        // --- Utilities ---
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[currentLang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-ph')]);
            
            updateActionBtnUI();
            renderTasks(); // Re-render to update empty state text
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                document.getElementById('fsIcon').className = 'fa-solid fa-compress';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fsIcon').className = 'fa-solid fa-expand';
                }
            }
        }
    </script>
</body>
</html>
