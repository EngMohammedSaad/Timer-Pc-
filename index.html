<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Elite PC - Ultra Custom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Cairo:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Lato:wght@400;700&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&family=Playfair+Display:wght@400;700&family=Rubik:wght@400;700&family=Lora:wght@400;700&family=Nunito:wght@400;700&family=Outfit:wght@400;700&family=Lexend:wght@400;700&family=Tajawal:wght@400;700&family=Amiri:wght@400;700&family=Almarai:wght@400;700&family=El+Messiri:wght@400;700&family=Changa:wght@400;700&family=Kanit:wght@400;700&family=Quicksand:wght@400;700&family=Josefin+Sans:wght@400;700&family=Anton&family=Space+Grotesk:wght@400;700&family=Syne:wght@400;700&family=Work+Sans:wght@400;700&family=Fira+Sans:wght@400;700&family=Barlow:wght@400;700&family=Titillium+Web:wght@400;700&family=Mukta:wght@400;700&family=Heebo:wght@400;700&family=Inconsolata:wght@400;700&family=Bebas+Neue&family=Abril+Fatface&family=Pacifico&family=Righteous&family=Lobster&family=Comfortaa:wght@400;700&family=Varela+Round&family=Dancing+Script:wght@700&family=Caveat:wght@700&family=Satisfy&family=Zilla+Slab:wght@400;700&family=Exo+2:wght@400;700&family=Signika:wght@400;700&family=Kalam:wght@700&family=Permanent+Marker&family=Khand:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-accent: #3b82f6; 
            --bg-site: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease, color 0.3s;
        }

        /* Navigation */
        .top-nav {
            position: fixed;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 12px 24px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            cursor: pointer;
        }
        .nav-btn:hover { background: var(--primary-accent); border-color: transparent; transform: translateY(-3px); }

        /* Main Card */
        .card-container {
            background: var(--card-bg);
            padding: 60px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 550px;
            backdrop-filter: blur(30px);
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.6), 0 0 40px rgba(var(--primary-accent), 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.4s ease;
        }

        h2 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; }
        .desc { color: var(--text-dim); margin-bottom: 30px; font-size: 1.1rem; }

        .pomo-modes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .mode-btn.active {
            background: var(--primary-accent);
            color: white;
            box-shadow: 0 10px 20px var(--primary-accent);
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 0 0 30px var(--primary-accent);
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-main {
            padding: 18px 45px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-btn { background: white; color: black; }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255,255,255,0.3); }
        .reset-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }

        /* Customizer Panel */
        .customizer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            align-items: center;
        }

        .tool-box { text-align: left; }
        .tool-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 10px; }

        /* Color Inputs */
        .color-row { display: flex; gap: 8px; }
        .color-box {
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid white;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .color-box input { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; }

        /* Font Selector Styling - Fixed Visibility */
        #fontSelector {
            width: 100%;
            background: #1e293b; /* Dark background so text is always visible */
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        #fontSelector option {
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        /* Custom Time Input */
        .custom-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            outline: none;
        }

        @media (max-width: 768px) {
            .card-container { max-width: 90%; padding: 40px 20px; }
            .timer-display { font-size: 5rem; }
            .customizer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="top-nav">
        <a href="site.html" class="nav-btn"><i class="fa-solid fa-house"></i> <span data-i18n="home">Home</span></a>
        <button class="nav-btn" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span id="langTxt">عربي</span></button>
    </div>

    <div class="card-container" id="pomoCard">
        <h2 id="title" data-i18n="title">Focus Session</h2>
        <p class="desc" data-i18n="desc">Pick your vibe and start crushing goals.</p>

        <div class="pomo-modes">
            <button class="mode-btn active" id="m-work" onclick="setMode('work', 25)" data-i18n="m_work">Work</button>
            <button class="mode-btn" id="m-short" onclick="setMode('short', 5)" data-i18n="m_short">Short Break</button>
            <button class="mode-btn" id="m-long" onclick="setMode('long', 15)" data-i18n="m_long">Long Break</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button class="btn-main start-btn" onclick="toggleTimer()" id="mainAction">
                <i class="fa-solid fa-play"></i> <span data-i18n="start">Start</span>
            </button>
            <button class="btn-main reset-btn" onclick="resetTimer()">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>

        <div class="customizer">
            <div class="tool-box">
                <span class="tool-label" data-i18n="c_time">Minutes</span>
                <input type="number" class="custom-input" id="customMin" value="25" onchange="setCustomMode(this.value)">
            </div>

            <div class="tool-box">
                <span class="tool-label" data-i18n="c_font">50 Pro Fonts</span>
                <select id="fontSelector" onchange="updateFont(this.value)">
                    <option value="'Poppins'">Poppins (Default)</option>
                    <option value="'Cairo'">Cairo (Professional Arabic)</option>
                    <option value="'Montserrat'">Montserrat</option>
                    <option value="'Tajawal'">Tajawal (Modern Arabic)</option>
                    <option value="'Lexend'">Lexend</option>
                    <option value="'Bebas Neue'">Bebas Neue (Heavy)</option>
                    <option value="'Outfit'">Outfit</option>
                    <option value="'Space Grotesk'">Space Grotesk</option>
                    <option value="'Almarai'">Almarai (Arabic Sans)</option>
                    <option value="'Playfair Display'">Playfair Display (Serif)</option>
                    <option value="'Amiri'">Amiri (Classic Arabic)</option>
                    <option value="'Righteous'">Righteous</option>
                    <option value="'Syne'">Syne (Creative)</option>
                    <option value="'Inconsolata'">Inconsolata (Code)</option>
                    <option value="'Permanent Marker'">Marker Style</option>
                    </select>
            </div>

            <div class="tool-box">
                <span class="tool-label" data-i18n="c_colors">Colors</span>
                <div class="color-row">
                    <div class="color-box" title="Accent"><input type="color" value="#3b82f6" oninput="updateColor('--primary-accent', this.value)"></div>
                    <div class="color-box" title="Background" style="border-color: #ff4757;"><input type="color" value="#020617" oninput="updateColor('--bg-site', this.value)"></div>
                    <div class="color-box" title="Card Color"><input type="color" value="#0f172a" oninput="updateCardColor(this.value)"></div>
                    <div class="color-box" title="Text Color"><input type="color" value="#ffffff" oninput="updateColor('--text-main', this.value)"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let totalTime = 25 * 60;
        let timeLeft = totalTime;
        let timerId = null;
        let isRunning = false;
        let currentLang = 'en';

        const i18n = {
            en: { home: "Home", title: "Focus Session", desc: "Pick your vibe and start crushing goals.", m_work: "Work", m_short: "Short", m_long: "Long", start: "Start", pause: "Pause", c_time: "Custom Time", c_font: "Font Family", c_colors: "Theme Colors" },
            ar: { home: "الرئيسية", title: "جلسة تركيز", desc: "اختار المود اللي يريحك وابدأ إنجاز.", m_work: "وقت العمل", m_short: "بريك قصير", m_long: "بريك طويل", start: "ابدأ", pause: "إيقاف", c_time: "وقت مخصص", c_font: "نوع الخط", c_colors: "الألوان" }
        };

        function updateColor(prop, val) {
            document.documentElement.style.setProperty(prop, val);
            if (prop === '--primary-accent') {
                document.getElementById('pomoCard').style.boxShadow = `0 30px 100px rgba(0,0,0,0.6), 0 0 40px ${val}33`;
            }
        }

        function updateCardColor(val) {
            document.documentElement.style.setProperty('--card-bg', val + 'CC');
        }

        function updateFont(font) {
            document.body.style.fontFamily = font + ", sans-serif";
            document.getElementById('fontSelector').style.fontFamily = font;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18n[currentLang][el.getAttribute('data-i18n')];
            });
            document.getElementById('langTxt').innerText = currentLang === 'en' ? 'عربي' : 'English';
            updateButtonUI();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function setMode(type, mins) {
            clearInterval(timerId);
            isRunning = false;
            totalTime = mins * 60;
            timeLeft = totalTime;
            document.getElementById('customMin').value = mins;
            updateDisplay();
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`m-${type}`).classList.add('active');
            updateButtonUI();
        }

        function setCustomMode(val) {
            if (val && val > 0) {
                setMode('custom', parseInt(val));
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            }
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        document.getElementById('alarmSound').play();
                        alert(currentLang === 'ar' ? "انتهى الوقت!" : "Time is up!");
                        resetTimer();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
            updateButtonUI();
        }

        function updateButtonUI() {
            const btn = document.getElementById('mainAction');
            if (isRunning) {
                btn.querySelector('span').innerText = i18n[currentLang].pause;
                btn.querySelector('i').className = 'fa-solid fa-pause';
            } else {
                btn.querySelector('span').innerText = i18n[currentLang].start;
                btn.querySelector('i').className = 'fa-solid fa-play';
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = totalTime;
            updateDisplay();
            updateButtonUI();
        }

        updateDisplay();
    </script>
</body>
</html>
